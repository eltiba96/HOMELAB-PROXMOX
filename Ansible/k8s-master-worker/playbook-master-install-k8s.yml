---
# Single control-plane cluster: one master node.
#
# Play 1 — prerequisites on the master
# Play 2 — kubeadm init + Flannel on the master

- name: Prerequisites on the master node
  hosts: vm-master
  become: yes
  vars:
    # Kubernetes minor version — bump here to upgrade (repo, packages, crictl all follow)
    kubernetes_version: "1.36"
  tasks:
    ### --- Disable swap ---
    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      when: ansible_swaptotal_mb > 0

    - name: Comment out swap in /etc/fstab to disable at boot
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'

    ### --- Required kernel modules ---
    - name: Create kernel modules file
      ansible.builtin.copy:
        dest: /etc/modules-load.d/containerd.conf
        content: |
          overlay
          br_netfilter

    - name: Load modules immediately
      ansible.builtin.shell: |
        modprobe overlay
        modprobe br_netfilter

    ### --- Sysctl parameters ---
    - name: Configure network parameters for Kubernetes
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-kubernetes-cri.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1

    - name: Apply sysctl configuration
      ansible.builtin.command: sysctl --system

    ### --- Base packages ---
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        update_cache: yes
        state: present

    ### --- Docker + Containerd ---
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable

    - name: Install Docker and Containerd
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        update_cache: yes
        state: present

    - name: Add user to docker group
      ansible.builtin.user:
        name: leo
        groups: docker
        append: yes

    - name: Create Docker daemon configuration
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        content: |
          {
            "exec-opts": ["native.cgroupdriver=systemd"],
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "100m"
            },
            "storage-driver": "overlay2"
          }

    - name: Enable and start Docker service
      ansible.builtin.systemd:
        name: docker
        enabled: yes
        state: started
        daemon_reload: yes

    - name: Configure containerd with proper CRI settings
      ansible.builtin.shell: |
        mkdir -p /etc/containerd
        containerd config default > /etc/containerd/config.toml
        # Enable systemd cgroup driver
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
        # Enable CRI plugin
        sed -i 's/disabled_plugins/#disabled_plugins/' /etc/containerd/config.toml

    - name: Enable and start containerd service
      ansible.builtin.systemd:
        name: containerd
        enabled: yes
        state: restarted
        daemon_reload: yes

    - name: Wait for containerd to be ready
      ansible.builtin.pause:
        seconds: 10

    ### --- Kubernetes packages ---
    - name: Install crictl for CRI debugging
      ansible.builtin.shell: |
        CRICTL_VERSION="v{{ kubernetes_version }}.0"
        wget https://github.com/kubernetes-sigs/cri-tools/releases/download/$CRICTL_VERSION/crictl-$CRICTL_VERSION-linux-amd64.tar.gz
        tar zxvf crictl-$CRICTL_VERSION-linux-amd64.tar.gz -C /usr/local/bin
        rm -f crictl-$CRICTL_VERSION-linux-amd64.tar.gz
        chmod +x /usr/local/bin/crictl
      args:
        creates: /usr/local/bin/crictl

    - name: Download and install Kubernetes GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

    - name: Set permissions for Kubernetes GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
        mode: '0644'

    - name: Add Kubernetes repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /

    - name: Install kubelet, kubeadm, kubectl
      ansible.builtin.apt:
        name:
          - "kubelet={{ kubernetes_version }}.*"
          - "kubeadm={{ kubernetes_version }}.*"
          - "kubectl={{ kubernetes_version }}.*"
        state: present
        update_cache: yes

    - name: Hold Kubernetes packages version
      ansible.builtin.command: apt-mark hold kubelet kubeadm kubectl

    - name: Enable kubelet
      ansible.builtin.systemd:
        name: kubelet
        enabled: yes


- name: Initialize the master
  hosts: vm-master1
  become: yes
  vars:
    pod_network_cidr: "10.244.0.0/16"
  tasks:
    - name: Create static pod manifests directory
      ansible.builtin.file:
        path: /etc/kubernetes/manifests
        state: directory
        mode: '0755'

    - name: Initialize control plane
      ansible.builtin.command: >
        kubeadm init
        --pod-network-cidr={{ pod_network_cidr }}
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
      args:
        creates: /etc/kubernetes/admin.conf
      register: init_output

    - name: Show initialization output
      ansible.builtin.debug:
        var: init_output.stdout_lines
      when: init_output is changed

    - name: Copy admin.conf to root for kubectl
      ansible.builtin.shell: |
        mkdir -p /root/.kube
        cp -f /etc/kubernetes/admin.conf /root/.kube/config
        chown root:root /root/.kube/config

    - name: Copy admin.conf to leo user for kubectl
      ansible.builtin.shell: |
        mkdir -p /home/leo/.kube
        cp -f /etc/kubernetes/admin.conf /home/leo/.kube/config
        chown leo:leo /home/leo/.kube/config
        chmod 600 /home/leo/.kube/config

    - name: Install Flannel CNI
      ansible.builtin.shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml

    - name: Wait for system pods to be ready
      ansible.builtin.shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl wait --for=condition=Ready pods --all -n kube-system --timeout=300s
      ignore_errors: yes

    - name: Remove taint from master to allow workload pods (OPTIONAL)
      ansible.builtin.shell: |
        export KUBECONFIG=/etc/kubernetes/admin.conf
        kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      ignore_errors: yes
      when: allow_pods_on_master | default(false) | bool
